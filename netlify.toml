[build]
  command = "pnpm build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https://rickandmortyapi.com; font-src 'self'; connect-src 'self' https://rickandmortyapi.com; form-action 'self'; manifest-src 'self';"
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https://rickandmortyapi.com; font-src 'self'; connect-src 'self' https://rickandmortyapi.com; form-action 'self'; manifest-src 'self'; require-trusted-types-for 'script'; trusted-types default;"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
